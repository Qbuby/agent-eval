# ─────────────────────────────────────────────────────────────────────
# Agent Eval · Docker Compose
# ─────────────────────────────────────────────────────────────────────
#
# 整套部署包含 4 个服务，按依赖关系顺序启动：
#   1. postgres   ─ 数据库（持久化在 volume pgdata）
#   2. migrate    ─ 一次性任务：建表/升表后退出（依赖 postgres healthy）
#   3. backend    ─ FastAPI 后端（依赖 migrate 完成）
#   4. frontend   ─ Nginx 静态资源 + /api 反代到 backend
#
# 一步部署：
#   1) cp .env.example .env  并填写 AUTH_SECRET_KEY、SECURITY_FERNET_KEY、
#      LANGSMITH_API_KEY、LANGFUSE_*（Langfuse 不用可留空）
#   2) docker compose up -d --build
#
# 访问入口：
#   前端 UI:  http://localhost
#   后端 API: http://localhost:8000
#
# 环境变量来源：
#   - .env 文件被 migrate / backend 通过 env_file 加载（DB / Auth / Crypto / LLM / Langfuse / LangSmith）
#   - DB_HOST/DB_PORT 在 environment: 段被强制覆盖为容器内 DNS（postgres:5432）
#   - 修改 PG 密码后需要 `docker compose down -v` 清掉 volume 才能生效
#   - SECURITY_FERNET_KEY 必填，缺失时 evaluator-providers 接口会 503；
#     生成方式见 .env.example
# ─────────────────────────────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL：业务主存储
  #   - 用例 / Trace / 评分 / 优化记录 / 闭环日志全部落这里
  #   - healthcheck 用 pg_isready 判断「能接受连接」，避免上层服务
  #     在 PG 还在启动时就尝试连接而失败
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-eval-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-agent_eval}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-agent_eval}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # migrate：数据库结构迁移（一次性任务）
  #
  # 为什么需要这个服务？
  #   后端代码里有 SQLAlchemy ORM 模型（src/agent_eval/db_models/tables.py），
  #   定义了 dataset_versions / test_cases / test_runs / test_results /
  #   evaluation_scores / optimizations / loop_control_log / users /
  #   projects / candidate_cases / benchmark_cases / audit_logs /
  #   evaluator_configs / evaluator_versions / evaluator_providers / ... 等数十张表。
  #
  #   这些表必须存在于 PG 中后端才能工作。alembic 是「数据库版本控制」工具，
  #   通过 alembic/versions/ 下的迁移脚本（0001 → 当前 head 0015）按顺序执行，
  #   把空数据库一步步建成当前 schema。
  #
  # 这个服务做什么？
  #   1. 用和 backend 完全相同的镜像（包含 alembic 和迁移脚本）
  #   2. 连上 postgres，对比当前 DB 版本和 alembic/versions/ 下的最高版本
  #   3. 执行差量升级（缺哪些迁移补哪些），全新库会从 0001 一路升到 head
  #   4. 升级完成后容器退出（restart: "no"）
  #
  # 为什么独立成一个服务而不是在 backend 启动时跑？
  #   - 多副本时只需迁移一次，不会让多个 backend 实例并发 ALTER TABLE 死锁
  #   - 失败可单独重跑：docker compose run --rm migrate
  #   - backend 通过 service_completed_successfully 等它退出码 0 后再启动，
  #     保证 schema 就位之前不接流量
  #
  # 同步驱动注意：
  #   alembic 是同步框架，env.py 已强制把 +asyncpg 替换成 +psycopg2。
  #   后端镜像里也额外装了 psycopg2-binary 给 alembic 用（不影响应用层 asyncpg）。
  # ─────────────────────────────────────────────────────────────────
  migrate:
    # ⚠️ 不要给 migrate 单独写 build —— 它必须和 backend 用**同一个镜像**，
    # 否则迁移脚本跑的 /app/alembic 版本可能与 backend 运行时的 ORM 模型漂移
    # （生产曾出现 migrate=:latest、backend=:main-24 不一致）。这里只 image:
    # 引用 backend 那一份（同名同 tag），由 backend 的 build 段构建一次、二者共享。
    # CI 注入 BACKEND_IMAGE / IMAGE_TAG 时，migrate 与 backend 必然同版本。
    image: ${BACKEND_IMAGE:-agent_eval-backend}:${IMAGE_TAG:-latest}
    container_name: agent-eval-migrate
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-agent_eval}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-in-production}
      # 数据 seed 还原路径（容器内）。SEED_DISABLE=1 可强制跳过还原，只建结构。
      SEED_FILE: /app/deploy/seed/seed.sql
      SEED_DISABLE: ${SEED_DISABLE:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 数据 seed 只读挂载。NOT baked into the image：内含密码哈希 /
      # Fernet 加密的 provider key / 明文入口码。部署时把 deploy/seed/seed.sql
      # 随 compose 一起放到宿主，migrate 在空库时还原它（非空库一律跳过）。
      - ./deploy/seed:/app/deploy/seed:ro
    # 先按空库门禁还原数据 seed，再 alembic upgrade head 追平结构。
    command: ["/app/scripts/migrate-and-restore.sh"]
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # backend：FastAPI + uvicorn
  #   - env_file 加载 .env 里的 LLM / LangSmith / Langfuse / Crypto key
  #   - environment 段覆盖 DB_HOST/DB_PORT，把 .env 里的 localhost 改成
  #     compose 内部 DNS 名 postgres
  #   - SECURITY_FERNET_KEY 必填：evaluator-providers 接口落库 API key
  #     时调用 cryptography.Fernet 加密，缺失会 503。生成方式见 .env.example。
  #   - depends_on:
  #       postgres healthy   → PG 可连
  #       migrate completed  → schema 就位
  # ─────────────────────────────────────────────────────────────────
  backend:
    # build 段构建出的镜像同时供 backend 运行与 migrate 迁移使用（见 migrate
    # 服务），二者共享同一 image 名 + tag，物理上杜绝版本漂移。CI 可注入
    # BACKEND_IMAGE（registry 全名）/ IMAGE_TAG（如 main-25）统一打 tag。
    image: ${BACKEND_IMAGE:-agent_eval-backend}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-eval-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      # 下列 3 个变量虽然 env_file 已加载，这里显式列出方便排查；
      # 在 shell 里 export 同名变量可临时覆盖 .env 内容。
      # SECURITY_FERNET_KEY 留空时 evaluator-providers 接口会 503，
      # 但 compose 启动不会失败 —— 留 :- 默认空，方便先把库迁了再补 key。
      SECURITY_FERNET_KEY: ${SECURITY_FERNET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      # 显式覆盖被测 agent 所在宿主网关。留空时 entrypoint 自动探测
      # （WSL 宿主 resolv.conf nameserver → 默认路由）。非 WSL / 特殊网络
      # 可在此写死，例如 AGENT_HOST_GATEWAY=172.16.100.211。
      AGENT_HOST_GATEWAY: ${AGENT_HOST_GATEWAY:-}
      # 评估完成通知的全局固定接收者（env_file 已加载，显式列出便于排查）。
      # Bitable 导入/导出走 app 身份（tenant_access_token，SDK 自动换取），
      # 无需 OAuth，故此处不再需要 REDIRECT_URI / SCOPES。
      FEISHU_NOTIFY_OPEN_IDS: ${FEISHU_NOTIFY_OPEN_IDS:-}
    ports:
      - "8000:8000"
    # 被测 agent 跑在 Windows 宿主上（SSH 隧道 0.0.0.0:18094）。本栈是
    # WSL2 原生 Docker，compose 的 host-gateway 会把 host.docker.internal
    # 错误解析到 docker 网桥（WSL VM），连不到 Windows 宿主。改为：把宿主
    # 的 /etc/resolv.conf 挂进来，entrypoint 读其 nameserver（= WSL→Windows
    # 宿主网关，WSL 重启会自动更新）注入为 host.docker.internal。配置页
    # 与评估统一用 http://host.docker.internal:18094/... 这个稳定名字。
    volumes:
      - /etc/resolv.conf:/run/host-resolv.conf:ro
    # judge / agent 调用走外网域名（如 kiro.aidong-ai.com），
    # 宿主 /etc/resolv.conf 在某些 Docker Desktop / WSL 环境下
    # 不会被容器继承，导致 "Temporary failure in name resolution"。
    # 显式指定 DNS 兜底。
    # ⚠️ 阿里云/腾讯 DNS 放最前：图片代理回源阿里云 OSS（*.aliyuncs.com），
    # 8.8.8.8/1.1.1.1 在国内对 OSS 域名解析间歇性失败或解析到错误节点，
    # 导致 img-proxy 偶发 502；国内 DNS 对 OSS 解析稳定。8.8.8.8 留作兜底。
    dns:
      - 223.5.5.5
      - 119.29.29.29
      - 8.8.8.8
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # frontend：Nginx 提供静态资源 + /api 反代到 backend
  #   - 镜像内置 nginx.conf，已配置 SPA fallback、长缓存、SSE 透传
  #   - 通过 docker 内部 DNS 访问 backend:8000，不依赖宿主机端口
  # ─────────────────────────────────────────────────────────────────
  frontend:
    # 与 backend 同样显式命名 + 可由 CI 注入 tag（FRONTEND_IMAGE / IMAGE_TAG），
    # 三个工作负载（backend、migrate 同镜像、frontend）统一打同一 IMAGE_TAG，
    # 一次发布版本一致。本地 build 段不变，CI 推镜像时复用此 image 名。
    image: ${FRONTEND_IMAGE:-agent_eval-frontend}:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-eval-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────
# 命名 volume：PG 数据持久化
#   docker compose down 不会删，docker compose down -v 才会清空
# ─────────────────────────────────────────────────────────────────────
volumes:
  pgdata:
